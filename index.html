<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-180.png">
<title>Spanish Flashcards</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --card-back: #1a1a40;
  --text: #e4e4e4;
  --text-dim: #aaaacc;
  --accent: #e94560;
  --green: #4ecca3;
  --yellow: #f0c040;
  --red: #e94560;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* Loading / Error states */
#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 16px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--surface);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#error {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 16px;
  padding: 24px;
  text-align: center;
}

#error button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

/* App layout */
#app {
  display: none;
  flex-direction: column;
  flex: 1;
  max-width: 500px;
  width: 100%;
  margin: 0 auto;
  padding: 16px;
  gap: 16px;
}

/* Top bar */
.top-bar {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
  font-size: 14px;
  color: var(--text-dim);
}

.top-bar .count { font-weight: 600; color: var(--text); }

.btn-home {
  position: fixed;
  top: 12px;
  right: 14px;
  font-size: 18px;
  color: var(--text-dim);
  opacity: 0.6;
  text-decoration: none;
  line-height: 1;
}
.btn-home:hover { opacity: 0.85; }
#session-stats { font-size: 12px; }

/* Card */
.card-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1000px;
  cursor: pointer;
  min-height: 0;
}

.card {
  width: 100%;
  max-height: 100%;
  min-height: 250px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.4s ease;
}

.card.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
}

.card-front {
  background: var(--card);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.card-back {
  background: var(--card-back);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  transform: rotateY(180deg);
  justify-content: flex-start;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.card-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.card-word {
  font-size: clamp(28px, 8vw, 48px);
  font-weight: 700;
  text-align: center;
  line-height: 1.2;
}

.card-translation {
  font-size: clamp(24px, 6vw, 36px);
  font-weight: 700;
  text-align: center;
  margin-bottom: 12px;
  width: 100%;
}

.card-pos {
  font-size: 14px;
  color: var(--green);
  margin-bottom: 16px;
  font-style: italic;
}

.card-sense {
  font-size: 13px;
  color: var(--text-dim);
  font-style: italic;
  text-align: center;
  margin-bottom: 12px;
  display: none;
}

.card-other {
  font-size: 14px;
  line-height: 1.5;
  color: var(--green);
  text-align: left;
  width: 100%;
  white-space: pre-wrap;
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: none;
  align-self: stretch;
}

.card-other .other-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.card-analysis {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-dim);
  text-align: left;
  width: 100%;
  white-space: pre-wrap;
  align-self: stretch;
}

.tap-hint {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 24px;
  opacity: 0.6;
}

/* Grade buttons */
.grade-buttons {
  display: flex;
  gap: 12px;
  padding-bottom: env(safe-area-inset-bottom, 8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.grade-buttons.visible {
  opacity: 1;
  pointer-events: auto;
}

.grade-btn {
  flex: 1;
  padding: 16px 8px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  color: white;
  transition: transform 0.1s ease, opacity 0.1s ease;
}

.grade-btn:active { transform: scale(0.95); opacity: 0.8; }

.btn-fail { background: var(--red); }
.btn-pass { background: #2a7a5a; }

/* Retire button */
.retire-row {
  display: flex;
  justify-content: center;
  padding-bottom: env(safe-area-inset-bottom, 4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.retire-row.visible {
  opacity: 1;
  pointer-events: auto;
}

.btn-retire {
  background: transparent;
  border: 1px solid #444466;
  color: #666688;
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, transform 0.1s;
}

.btn-retire:active { transform: scale(0.95); }

/* Flip-back button inside card */
.btn-flip-back {
  position: absolute;
  bottom: 10px;
  right: 12px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 6px;
  opacity: 0.4;
  line-height: 1;
}
.btn-flip-back:active { opacity: 0.8; }

/* Undo row */
.undo-row {
  display: flex;
  justify-content: center;
  padding-bottom: env(safe-area-inset-bottom, 4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.undo-row.visible {
  opacity: 1;
  pointer-events: auto;
}

.btn-undo {
  background: transparent;
  border: 1px solid #444466;
  color: #666688;
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, transform 0.1s;
}

.btn-undo:active { transform: scale(0.95); }

/* Empty state */
#empty {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 16px;
  padding: 24px;
  text-align: center;
  color: var(--text-dim);
}

#empty h2 { font-size: 24px; color: var(--text); }


#tl-tooltip {
  position: fixed;
  background: rgba(18,18,28,0.95);
  color: #e0e0e0;
  font-size: 11px;
  padding: 4px 9px;
  border-radius: 5px;
  pointer-events: none;
  white-space: nowrap;
  display: none;
  z-index: 9999;
  border: 1px solid rgba(255,255,255,0.13);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
</style>
</head>
<body>
<div id="tl-tooltip"></div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p>Loading vocabulary...</p>
</div>

<!-- Error -->
<div id="error">
  <p id="error-msg">Failed to load vocabulary.</p>
  <button onclick="location.reload()">Retry</button>
</div>

<!-- App -->
<a class="btn-home" href="home.html" title="Home">⌂</a>
<div id="app">
  <div class="top-bar">
    <span id="counter" class="count"></span>
    <span id="session-stats"></span>
    <div id="model-info" style="font-size:10px;color:var(--text-dim);opacity:0.45;margin-top:2px;"></div>
    <div id="day-timer" style="font-size:10px;color:var(--text-dim);opacity:0.45;"></div>
  </div>

  <div class="card-container" id="card-container">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="card-label" id="front-label"></div>
        <div class="card-word" id="front-word"></div>
        <div class="card-sense" id="front-sense"></div>
        <div class="tap-hint">tap to flip</div>
        <div id="front-precall" style="font-size:11px;color:var(--text-dim);margin-top:8px;opacity:0.5;"></div>
      </div>
      <div class="card-face card-back">
        <div class="card-label" id="back-label"></div>
        <div class="card-translation" id="back-word"></div>
        <div class="card-pos" id="back-pos"></div>
        <div id="review-timeline" style="width:100%;margin:10px 0 0;"></div>
        <div id="timeline-stats" style="width:100%;font-size:11px;color:var(--text-dim);opacity:0.6;margin-bottom:2px;text-align:right;"></div>
        <div id="back-dates" style="font-size:11px;color:var(--text-dim);opacity:0.5;margin-top:4px;line-height:1.8;"></div>
        <div class="card-other" id="back-other"></div>
        <div class="card-analysis" id="back-analysis"></div>
        <button class="btn-flip-back" onclick="event.stopPropagation(); flipToFront();">↩</button>
      </div>
    </div>
  </div>

  <div class="grade-buttons" id="grade-buttons">
    <button class="grade-btn btn-fail" onclick="grade(false)">Fail</button>
    <button class="grade-btn btn-pass" onclick="grade(true)">Pass</button>
  </div>
  <div class="retire-row" id="retire-row">
    <button class="btn-retire" onclick="retire()">Retire — I'll never forget this</button>
  </div>
  <div class="undo-row" id="undo-row">
    <button class="btn-undo" onclick="undoLast()">Undo last card</button>
  </div>
</div>

<!-- Empty state -->
<div id="empty">
  <h2 id="empty-title"></h2>
  <p id="empty-body"></p>
</div>

<script>
const SPREADSHEET_ID = '14oqOzF2MXMDvhp8XbZo1fa3yFHTW3anVgfFrHvK4tNc';
const SHEET1_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;
const SHEET2_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet2`;
const STORAGE_KEY = 'spanish-flashcards-v2';
const TODAY_COUNT_KEY = 'spanish-flashcards-today-count';
const TODAY_SYNC_KEY = '__today__';
const DAILY_WAA_KEY = 'spanish-flashcards-daily-waa';
const MODEL_CACHE_KEY = 'spanish-flashcards-model-cache';
const DEVICE_ID_KEY = 'spanish-flashcards-device-id';
const TIMER_REMOTE_KEY = 'spanish-flashcards-timer-remote';
const TIMER_SYNC_KEY = '__timer_history__';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwbrp0yQwWy4TXLeG0h2NAhW3l0gS4ECGzHhkHJ2XxO2joA7-ShSkTR0Ax2tXbclNW7/exec';

let allCards = [];
let currentCard = null;

// ---- Day Timer (active time only, resets at midnight) ----
const DAY_TIMER_KEY = 'spanish-flashcards-day-timer';
const DAY_TIMER_HISTORY_KEY = 'spanish-flashcards-time-history';

function getDayTimer() {
  try {
    const d = JSON.parse(localStorage.getItem(DAY_TIMER_KEY));
    if (d && d.date === todayStr()) return d.seconds;
  } catch {}
  return 0;
}

function saveDayTimer(seconds) {
  const today = todayStr();
  localStorage.setItem(DAY_TIMER_KEY, JSON.stringify({ date: today, seconds }));
  try {
    const myId = getDeviceId();
    const history = JSON.parse(localStorage.getItem(DAY_TIMER_HISTORY_KEY)) || {};
    const otherSecs = getTimerRemoteCache()
      .filter(e => e.deviceId !== myId)
      .reduce((sum, e) => sum + (e.data?.[today] || 0), 0);
    history[today] = seconds + otherSecs;
    localStorage.setItem(DAY_TIMER_HISTORY_KEY, JSON.stringify(history));
  } catch {}
}

function getDeviceId() {
  let id = localStorage.getItem(DEVICE_ID_KEY);
  if (!id) {
    id = Math.random().toString(36).slice(2) + Math.random().toString(36).slice(2);
    localStorage.setItem(DEVICE_ID_KEY, id);
  }
  return id;
}

function getTimerRemoteCache() {
  try { return JSON.parse(localStorage.getItem(TIMER_REMOTE_KEY)) || []; } catch { return []; }
}

function pushTimerHistory() {
  if (!remoteEnabled()) return;
  const myId = getDeviceId();
  const today = todayStr();
  const localHistory = {};
  try { Object.assign(localHistory, JSON.parse(localStorage.getItem(DAY_TIMER_HISTORY_KEY)) || {}); } catch {}
  // Store my raw seconds for today (not the merged total which includes other devices)
  const myHistory = { ...localHistory, [today]: dayTimerSeconds };
  const otherEntries = getTimerRemoteCache().filter(e => e.deviceId !== myId);
  pushSRSRemote([{
    word: TIMER_SYNC_KEY,
    reviews: [{ deviceId: myId, data: myHistory }, ...otherEntries],
    lastReview: today,
    retired: false,
  }]);
}

function mergeTimerHistory(remoteReviews) {
  if (!remoteReviews?.length) return;
  localStorage.setItem(TIMER_REMOTE_KEY, JSON.stringify(remoteReviews));
  // Sum all devices' contributions per day
  const merged = {};
  for (const entry of remoteReviews) {
    if (!entry.deviceId || !entry.data) continue;
    for (const [date, secs] of Object.entries(entry.data)) {
      merged[date] = (merged[date] || 0) + secs;
    }
  }
  // Today: local device may be ahead of remote — use max(local, remote) for my share
  const today = todayStr();
  const myId = getDeviceId();
  const myEntry = remoteReviews.find(e => e.deviceId === myId);
  const myRemoteSecs = myEntry?.data?.[today] || 0;
  const otherSecs = (merged[today] || 0) - myRemoteSecs;
  merged[today] = otherSecs + Math.max(dayTimerSeconds, myRemoteSecs);
  localStorage.setItem(DAY_TIMER_HISTORY_KEY, JSON.stringify(merged));
}

function formatTimer(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

let dayTimerSeconds = getDayTimer();
let timerInterval = null;
let timerTickStart = null;

function startTimer() {
  if (timerInterval) return;
  timerTickStart = Date.now();
  timerInterval = setInterval(() => {
    dayTimerSeconds++;
    saveDayTimer(dayTimerSeconds);
    const el = document.getElementById('day-timer');
    if (el) el.textContent = `Today: ${formatTimer(dayTimerSeconds)}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) stopTimer(); else startTimer();
});

// Start immediately if page is visible and initialize display
if (!document.hidden) startTimer();
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('day-timer');
  if (el) el.textContent = `Today: ${formatTimer(dayTimerSeconds)}`;

});
function tlTipShow(e, el) {
  const t = document.getElementById('tl-tooltip');
  t.textContent = el.getAttribute('data-tip');
  t.style.display = 'block';
  t.style.left = (e.clientX + 14) + 'px';
  t.style.top = (e.clientY - 36) + 'px';
}
function tlTipHide() { document.getElementById('tl-tooltip').style.display = 'none'; }

let isFlipped = false;
let lastUndo = null;
const recentFails = {}; // word → timestamp of most recent fail
let randomCardCounter = 0; // counts picks since last random sample (post-new-cards phase)

// ---- Google Visualization JSON Parsing ----
function parseGvizJson(text) {
  const match = text.match(/google\.visualization\.Query\.setResponse\(({.*})\)/s);
  if (!match) throw new Error('Invalid response from Google Sheets');
  const data = JSON.parse(match[1]);
  if (data.status === 'error') {
    throw new Error(data.errors?.map(e => e.message).join(', ') || 'Sheet error');
  }
  const table = data.table;
  return table.rows.map(row =>
    row.c.map(cell => (cell && cell.v != null) ? String(cell.v) : '')
  );
}

// ---- Data Loading ----
async function fetchSheet(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return parseGvizJson(await res.text());
}

async function loadData() {
  try {
    const [[s1, s2]] = await Promise.all([
      Promise.all([fetchSheet(SHEET1_URL), fetchSheet(SHEET2_URL)]),
      syncRemoteSRS(),
      loadSRSModel(),
    ]);

    const s2Map = {};
    for (let i = 0; i < s2.length; i++) {
      const key = (s2[i][0] || '').split('\n')[0].trim().toLowerCase();
      if (key) s2Map[key] = s2[i];
    }

    const cards = [];
    for (let i = 0; i < s1.length; i++) {
      const spanish = (s1[i][1] || '').trim();
      const english = (s1[i][2] || '').trim();
      const sense    = (s1[i][5] || '').trim();
      const transCtx = (s1[i][6] || '').trim();
      if (!spanish) continue;
      let lookupKey = sense ? `${spanish}: ${english} (${sense})` : `${spanish}: ${english}`;
      if (transCtx) lookupKey += ` [${transCtx}]`;
      const s2row = s2Map[lookupKey.toLowerCase()] || [];
      const reviewed = (s2row[2] || '').toUpperCase() === 'TRUE';
      if (!reviewed) continue;

      cards.push({
        spanish,
        english,
        pos: s1[i][3] || '',
        sense,
        transCtx,
        analysis: s2row[1] || '',
        otherTranslations: s2row[4] || '',
        dateReviewed: parseMDY(s2row[3] || ''),
        dateAdded: (s1[i][0] || '').trim(),
      });
    }

    if (cards.length === 0) {
      throw new Error('No reviewed words found. Mark words as reviewed in Sheet2 column C.');
    }

    allCards = cards;
    showApp();
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'flex';
    document.getElementById('error-msg').textContent = err.message;
  }
}

// ---- Today Counter ----
function getTodayCount() {
  try {
    const data = JSON.parse(localStorage.getItem(TODAY_COUNT_KEY));
    if (data && data.date === todayStr()) return data.count;
  } catch {}
  return 0;
}

function incrementTodayCount() {
  const count = getTodayCount() + 1;
  localStorage.setItem(TODAY_COUNT_KEY, JSON.stringify({ date: todayStr(), count }));
  updateCounter();
  pushTodayCount(count);
}

function parseTodayCount(entry) {
  if (!entry?.reviews?.length) return 0;
  const r = entry.reviews[0];
  return r.date === todayStr() ? (r.count || 0) : 0;
}

function setTodayCount(count) {
  localStorage.setItem(TODAY_COUNT_KEY, JSON.stringify({ date: todayStr(), count }));
  updateCounter();
}

function pushTodayCount(count) {
  if (!remoteEnabled()) return;
  pushSRSRemote([{
    word: TODAY_SYNC_KEY,
    reviews: [{ date: todayStr(), count }],
    lastReview: todayStr(),
    retired: false,
  }]);
}

function computeSessionStats() {
  const srs = getSRS();
  const today = todayStr();

  let newDone = 0, newRemaining = 0;

  for (const card of allCards) {
    const data = srs[card.spanish];
    if (data?.retired) continue;
    if (card.dateAdded === today) continue;
    if (card.dateReviewed === today) continue;

    const reviews = data?.reviews || [];
    const firstReviewToday = reviews.length > 0 && reviews.every(r => r.date.startsWith(today));

    if (reviews.length === 0) {
      newRemaining++;
    } else if (firstReviewToday) {
      newDone++;
    }
  }

  return { newDone, newRemaining };
}

function updateCounter() {
  const count = getTodayCount();
  document.getElementById('counter').textContent =
    count === 0 ? 'No cards done yet today' : `${count} done today`;

  const { newDone, newRemaining } = computeSessionStats();
  const parts = [];

  if (newDone > 0 || newRemaining > 0) {
    const total = newDone + newRemaining;
    const done = newRemaining === 0;
    parts.push(`<span style="color:${done ? 'var(--green)' : 'inherit'}">New ${newDone}/${total}</span>`);
  }

  const srs = getSRS();
  const now = Date.now();
  const inHoldout = c => recentFails[c.spanish] && now - recentFails[c.spanish] < 2 * 60 * 1000;
  const holdout = allCards.filter(inHoldout).length;
  const under90 = allCards.filter(c => !srs[c.spanish]?.retired && c.dateReviewed !== todayStr() && srs[c.spanish]?.reviews?.length > 0 && !inHoldout(c) && getPRecall(srs[c.spanish]) < 0.9).length;
  const todayWAA = getDailyWAA()[todayStr()] || 0;
  const waaSign = todayWAA >= 0 ? '+' : '';
  const waaColor = todayWAA >= 0 ? 'var(--green)' : 'var(--red)';
  parts.push(`<90%: ${under90}`);
  parts.push(`Holdout: ${holdout}`);
  parts.push(`<span style="color:${waaColor}">Daily WAA: ${waaSign}${todayWAA.toFixed(1)}</span>`);

  document.getElementById('session-stats').innerHTML = parts.join(' · ');
}

// ---- SRS Storage ----
function getSRS() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
  } catch { return {}; }
}

function saveSRS(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ---- Daily WAA Storage ----
function getDailyWAA() {
  try { return JSON.parse(localStorage.getItem(DAILY_WAA_KEY)) || {}; } catch { return {}; }
}
function addDailyWAA(delta) {
  const today = todayStr();
  const data = getDailyWAA();
  data[today] = (data[today] || 0) + delta;
  localStorage.setItem(DAILY_WAA_KEY, JSON.stringify(data));
}

// ---- Remote SRS Sync ----
function remoteEnabled() {
  return APPS_SCRIPT_URL && APPS_SCRIPT_URL !== 'YOUR_APPS_SCRIPT_URL_HERE';
}

async function syncRemoteSRS() {
  if (!remoteEnabled()) return;
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    if (!res.ok) return;
    const remote = await res.json();
    const local = getSRS();

    const merged = { ...remote };
    const localOnly = [];
    for (const [word, data] of Object.entries(local)) {
      if (!merged[word] || (data.lastReview || '') > (merged[word].lastReview || '')) {
        // Migrate old format: reconstruct right/wrong from reviews if missing
        if (data.reviews && data.right === undefined) {
          data.right = data.reviews.filter(r => r.passed).length;
          data.wrong = data.reviews.filter(r => !r.passed).length;
          data.firstReview = data.reviews.length > 0 ? data.reviews[0].date : '';
        }
        merged[word] = data;
      }
      if (!remote[word]) localOnly.push({ word, ...data });
    }

    saveSRS(merged);

    const remoteCount = parseTodayCount(remote[TODAY_SYNC_KEY]);
    const localCount = getTodayCount();
    if (remoteCount > localCount) {
      setTodayCount(remoteCount);
    } else if (localCount > remoteCount) {
      pushTodayCount(localCount);
    }

    mergeTimerHistory(remote[TIMER_SYNC_KEY]?.reviews);
    pushTimerHistory();

    if (localOnly.length > 0) pushSRSRemote(localOnly);
  } catch (e) {
    console.warn('SRS remote sync failed, using local data:', e);
  }
}

function pushSRSRemote(updates) {
  if (!remoteEnabled()) return;
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(updates),
  }).catch(e => console.warn('SRS remote save failed:', e));
}

// ---- Neural Net Model ----
// Loaded from vocab_model.json (written nightly by retrain.py).
// Falls back to HLR heuristic if the file hasn't been generated yet.
const REVIEW_LOG_CAP = 20;
let srsModel = null;

async function loadSRSModel() {
  const el = document.getElementById('model-info');
  const setInfo = (msg, color, bold) => {
    if (!el) return;
    el.textContent = msg;
    el.style.color = color || '';
    el.style.opacity = color ? '1' : '0.45';
    el.style.fontWeight = bold ? '600' : '';
  };

  // Try fetching the latest model
  let fetched = null;
  try {
    const res = await fetch('vocab_model.json', { cache: 'no-cache' });
    if (res.ok) fetched = await res.json();
    else console.warn('vocab_model.json fetch failed:', res.status);
  } catch (e) {
    console.warn('vocab_model.json fetch error:', e);
  }

  if (fetched) {
    srsModel = fetched;
    try { localStorage.setItem(MODEL_CACHE_KEY, JSON.stringify(fetched)); } catch {}
    const trainedAt = new Date(fetched.trained_at);
    const daysSince = (Date.now() - trainedAt) / 86400000;
    const dateStr = trainedAt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    if (daysSince > 2) {
      setInfo(`⚠ Model stale — last trained ${dateStr} (${Math.floor(daysSince)}d ago)`, 'var(--yellow)', true);
    } else {
      setInfo(`Model: ${dateStr} · ${fetched.n_samples.toLocaleString()} samples`);
    }
    return;
  }

  // Fetch failed — fall back to last cached model
  let cached = null;
  try { cached = JSON.parse(localStorage.getItem(MODEL_CACHE_KEY)); } catch {}
  if (cached) {
    srsModel = cached;
    const dateStr = new Date(cached.trained_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    setInfo(`⚠ Model fetch failed — using cached model from ${dateStr}`, 'var(--yellow)', true);
    return;
  }

  // No model at all (first ever load with no network) — HLR is last resort only
  srsModel = null;
  setInfo('⚠ No model available — check connection and reload', 'var(--red)', true);
  console.warn('No SRS model available, falling back to HLR heuristic');
}

// Forward pass through the stored MLP weights.
// weights[l] has shape [in, out]; biases[l] has shape [out].
function nnForward(features, model) {
  let a = features.map((v, i) => (v - model.scaler_mean[i]) / model.scaler_std[i]);
  for (let l = 0; l < model.weights.length; l++) {
    const W = model.weights[l], b = model.biases[l];
    const z = b.map((bi, j) => bi + a.reduce((s, ai, k) => s + ai * W[k][j], 0));
    a = l < model.weights.length - 1
      ? z.map(v => Math.max(0, v))                              // ReLU hidden
      : z.map(v => 1 / (1 + Math.exp(-Math.max(-20, Math.min(20, v)))));  // sigmoid output
  }
  return a[0];
}

function getPRecall(data, displayOnly = false) {
  if (!data) return 0;
  const reviews = data.reviews || [];
  const lastReview = data.lastReview || (reviews.length ? reviews[reviews.length - 1].date : null);
  if (!lastReview) return 0;

  const daysSinceLast = Math.max((Date.now() - new Date(lastReview)) / 86400000, 0.01);

  const lastResult = reviews[reviews.length - 1];
  const recentFail = lastResult && !lastResult.passed && daysSinceLast < 1/24;

  let p;
  if (srsModel && reviews.length >= 1) {
    const n_correct = reviews.filter(r => r.passed).length;
    const n_wrong   = reviews.filter(r => !r.passed).length;
    const accuracy  = n_correct / reviews.length;
    const daysSinceFirst = Math.max((Date.now() - new Date(reviews[0].date)) / 86400000, 0.01);
    const features = [
      Math.log1p(daysSinceLast),
      n_correct,
      n_wrong,
      accuracy,
      Math.log1p(reviews.length),
      Math.log1p(daysSinceFirst),
    ];
    p = nnForward(features, srsModel);
  } else {
    // HLR fallback
    let h = 1.0, prevDate = null;
    for (const r of reviews) {
      const rawGap = prevDate ? (new Date(r.date) - new Date(prevDate)) / 86400000 : 1.0;
      const gap = rawGap > 0 ? rawGap : 1.0;
      h = Math.max(0.5, gap * (r.passed ? 2.0 : 0.5));
      prevDate = r.date;
    }
    p = Math.pow(2, -daysSinceLast / h);
  }

  if (recentFail && !displayOnly) return 0;
  return p;
}

function weightedRandom(cards, srs) {
  // Weight = (1 - P(recall))^2: squaring strongly favors low-recall cards.
  // A 90% card is 81x less likely to be picked than a 10% card.
  const weights = cards.map(c => Math.pow(1 - getPRecall(srs[c.spanish]), 2));
  const total = weights.reduce((s, w) => s + w, 0);
  if (total === 0) return cards[Math.floor(Math.random() * cards.length)];
  let r = Math.random() * total;
  for (let i = 0; i < cards.length; i++) {
    r -= weights[i];
    if (r <= 0) return cards[i];
  }
  return cards[cards.length - 1];
}

function pickNextCard() {
  const srs = getSRS();
  const today = todayStr();

  const FAIL_HOLDOUT_MS = 2 * 60 * 1000; // 2 minutes

  // Eligible = not retired, not added today, not marked reviewed in sheet today,
  // not the just-graded card, not in the 2-minute fail holdout
  const eligible = allCards.filter(c => {
    if (srs[c.spanish]?.retired) return false;
    if (c.dateAdded === today) return false;
    if (c.dateReviewed === today) return false;
    if (c.spanish === currentCard?.spanish) return false;
    if (recentFails[c.spanish] && Date.now() - recentFails[c.spanish] < FAIL_HOLDOUT_MS) return false;
    return true;
  });
  if (!eligible.length) return null;

  // 1. New words first (never reviewed), in sheet order
  const unreviewed = eligible.filter(c => !srs[c.spanish]?.reviews?.length);
  if (unreviewed.length) return unreviewed[0];

  // 2. Every 5th card: random sample from full eligible set (forces broad data collection)
  randomCardCounter++;
  if (randomCardCounter >= 5) {
    randomCardCounter = 0;
    return eligible[Math.floor(Math.random() * eligible.length)];
  }

  // 3. Otherwise pick the card with lowest P(recall)
  return eligible.reduce((best, c) =>
    getPRecall(srs[c.spanish]) < getPRecall(srs[best.spanish]) ? c : best
  );
}

// ---- Review Recording ----
function recordReview(word, passed) {
  const srs = getSRS();
  const entry = srs[word] || {};
  const reviews = entry.reviews || [];
  reviews.push({ date: nowStr(), passed });
  if (reviews.length > REVIEW_LOG_CAP) reviews.shift();
  const right = (entry.right || 0) + (passed ? 1 : 0);
  const wrong = (entry.wrong || 0) + (passed ? 0 : 1);
  const firstReview = entry.firstReview || nowStr();
  srs[word] = { ...entry, reviews, right, wrong, firstReview, lastReview: new Date().toISOString() };
  saveSRS(srs);
  pushSRSRemote([{ word, ...srs[word] }]);
}

// ---- Date Helpers ----
// Convert sheet date to "YYYY-MM-DD".
// Handles GViz Date(yyyy,m,d) (0-indexed month) and M/d/yyyy string formats.
function parseMDY(s) {
  if (!s) return '';
  const gviz = s.match(/^Date\((\d+),(\d+),(\d+)\)$/);
  if (gviz) {
    const [, y, m, d] = gviz;
    return `${y}-${String(Number(m) + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  }
  const parts = s.split('/');
  if (parts.length !== 3) return '';
  return `${parts[2]}-${String(parts[0]).padStart(2, '0')}-${String(parts[1]).padStart(2, '0')}`;
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}

function nowStr() {
  const d = new Date();
  return `${todayStr()}T${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
}

// ---- UI ----
function showEmpty() {
  const srs = getSRS();
  const allRetired = allCards.every(c => srs[c.spanish]?.retired);
  document.getElementById('app').style.display = 'none';
  document.getElementById('empty').style.display = 'flex';
  if (allRetired) {
    document.getElementById('empty-title').textContent = 'All cards retired';
    document.getElementById('empty-body').textContent = "You've retired every card. Nothing left to review!";
  } else {
    document.getElementById('empty-title').textContent = 'All done for today!';
    document.getElementById('empty-body').textContent = "You've been through every card today. Come back tomorrow!";
  }
}

function showApp() {
  document.getElementById('loading').style.display = 'none';
  const card = pickNextCard();
  if (!card) {
    showEmpty();
    return;
  }
  document.getElementById('app').style.display = 'flex';
  showCard(card);
}

function renderTimeline(srsData) {
  const reviews = srsData?.reviews;
  if (!reviews?.length) return '';

  const now = Date.now();
  const firstTime = new Date(reviews[0].date).getTime();
  const span = Math.max(now - firstTime, 1);

  const W = 280, H = 38, PAD = 6, AXIS_Y = 18, R = 5;
  const xOf = t => PAD + ((t - firstTime) / span) * (W - 2 * PAD);

  const fmtDate = iso => {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
  };

  let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">`;

  // Axis line
  svg += `<line x1="${PAD}" y1="${AXIS_Y}" x2="${W - PAD}" y2="${AXIS_Y}" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-linecap="round"/>`;

  // "Now" tick
  svg += `<line x1="${W - PAD}" y1="${AXIS_Y - 5}" x2="${W - PAD}" y2="${AXIS_Y + 5}" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>`;

  // Endpoint labels
  svg += `<text x="${PAD}" y="${H}" fill="rgba(255,255,255,0.28)" font-size="7.5" font-family="-apple-system,system-ui,sans-serif">${fmtDate(reviews[0].date)}</text>`;
  svg += `<text x="${W - PAD}" y="${H}" fill="rgba(255,255,255,0.28)" font-size="7.5" font-family="-apple-system,system-ui,sans-serif" text-anchor="end">now</text>`;

  // Review dots (vertical offset for same-day reviews, screen blend for overlaps)
  const dayOffset = {};
  for (const r of reviews) {
    const day = r.date.slice(0, 10);
    const level = dayOffset[day] || 0;
    dayOffset[day] = level + 1;
    const x = xOf(new Date(r.date).getTime()).toFixed(1);
    const cy = (AXIS_Y - level * 2).toFixed(1);
    const color = r.passed ? '#4ecca3' : '#e94560';
    const rd = new Date(r.date);
    const tip = rd.toLocaleDateString('en-US', { month: '2-digit', day: '2-digit', year: 'numeric' })
      + ' ' + rd.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true })
      + ' — ' + (r.passed ? 'pass' : 'fail');
    svg += `<circle cx="${x}" cy="${cy}" r="${R}" fill="${color}" fill-opacity="0.55" stroke="rgba(255,255,255,0.35)" stroke-width="1.2" style="mix-blend-mode:screen" data-tip="${tip}" onmousemove="tlTipShow(event,this)" onmouseout="tlTipHide()"></circle>`;
  }

  svg += '</svg>';
  return { svg, passes: reviews.filter(r => r.passed).length, total: reviews.length };
}

function showCard(card) {
  currentCard = card;
  isFlipped = false;

  document.getElementById('card').classList.remove('flipped');
  document.getElementById('grade-buttons').classList.remove('visible');
  document.getElementById('retire-row').classList.remove('visible');

  document.getElementById('front-label').textContent = 'English';
  document.getElementById('front-word').textContent = card.english;
  document.getElementById('back-label').textContent = 'Spanish';
  document.getElementById('back-word').textContent = card.spanish;

  const senseEl = document.getElementById('front-sense');
  if (card.sense) {
    senseEl.textContent = card.transCtx ? `${card.sense} (${card.transCtx})` : card.sense;
    senseEl.style.display = 'block';
  } else {
    senseEl.style.display = 'none';
  }

  document.getElementById('back-pos').textContent = card.pos;

  const otherEl = document.getElementById('back-other');
  if (card.otherTranslations) {
    otherEl.style.display = 'block';
    const normalizedOther = card.otherTranslations.trim()
      .split('\n').map(l => l.trim()).filter(l => l).join('\n\n');
    otherEl.innerHTML = '<div class="other-title">Other Translations</div>' + normalizedOther;
  } else {
    otherEl.style.display = 'none';
  }

  document.getElementById('back-analysis').textContent = (card.analysis || '').trim();

  const datesEl = document.getElementById('back-dates');
  const parts = [];
  if (card.dateAdded) parts.push('Added: ' + card.dateAdded);
  if (card.dateReviewed) parts.push('Reviewed: ' + card.dateReviewed);
  datesEl.textContent = parts.join('   ·   ');

  const srsData = getSRS()[card.spanish];
  const timeline = renderTimeline(srsData);
  document.getElementById('review-timeline').innerHTML = timeline ? timeline.svg : '';
  document.getElementById('timeline-stats').textContent = timeline ? `${timeline.passes} / ${timeline.total} correct` : '';
  const p = getPRecall(srsData, true);
  const precallEl = document.getElementById('front-precall');
  const isRecentFail = getPRecall(srsData) === 0;
  if (!srsData?.lastReview) {
    precallEl.textContent = 'new';
  } else if (isRecentFail) {
    precallEl.textContent = `P(recall): ${Math.round(p * 100)}% · recent fail`;
  } else {
    precallEl.textContent = `P(recall): ${Math.round(p * 100)}%`;
  }

  updateCounter();
}

function flipCard() {
  if (isFlipped) return;
  isFlipped = true;
  document.getElementById('card').classList.add('flipped');
  document.getElementById('grade-buttons').classList.add('visible');
  document.getElementById('retire-row').classList.add('visible');
}

function flipToFront() {
  if (!isFlipped) return;
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('grade-buttons').classList.remove('visible');
  document.getElementById('retire-row').classList.remove('visible');
}

function grade(passed) {
  if (!currentCard) return;
  const srs = getSRS();
  const waaDelta = (passed ? 1 : 0) - getPRecall(srs[currentCard.spanish]);
  lastUndo = {
    card: currentCard,
    srsEntry: srs[currentCard.spanish] ? JSON.parse(JSON.stringify(srs[currentCard.spanish])) : null,
    todayCount: getTodayCount(),
    waaDelta,
  };
  recordReview(currentCard.spanish, passed);
  addDailyWAA(waaDelta);
  if (!passed) recentFails[currentCard.spanish] = Date.now();
  else delete recentFails[currentCard.spanish];
  incrementTodayCount();
  const next = pickNextCard();
  if (!next) { showEmpty(); return; }
  showCard(next);
  document.getElementById('undo-row').classList.add('visible');
}

function undoLast() {
  if (!lastUndo) return;
  const { card, srsEntry, todayCount, waaDelta } = lastUndo;
  lastUndo = null;
  if (waaDelta != null) addDailyWAA(-waaDelta);
  const srs = getSRS();
  if (srsEntry === null) {
    delete srs[card.spanish];
  } else {
    srs[card.spanish] = srsEntry;
  }
  saveSRS(srs);
  pushSRSRemote([{ word: card.spanish, ...(srsEntry || { reviews: [], retired: false }) }]);
  localStorage.setItem(TODAY_COUNT_KEY, JSON.stringify({ date: todayStr(), count: todayCount }));
  pushTodayCount(todayCount);
  document.getElementById('undo-row').classList.remove('visible');
  showCard(card);
}

function retire() {
  if (!currentCard) return;
  const srs = getSRS();
  const entry = { ...(srs[currentCard.spanish] || {}), retired: true };
  srs[currentCard.spanish] = entry;
  saveSRS(srs);
  pushSRSRemote([{ word: currentCard.spanish, ...entry }]);
  const next = pickNextCard();
  if (!next) { showEmpty(); return; }
  showCard(next);
}

// ---- Event Listeners ----
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') pushTimerHistory();
});

document.getElementById('card-container').addEventListener('click', (e) => {
  if (e.target.closest('.card-back') && isFlipped) return;
  flipCard();
});

document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (!isFlipped) flipCard();
  } else if (isFlipped) {
    if (e.key === 'f' || e.key === 'F' || e.key === '1') grade(false);
    else if (e.key === 'p' || e.key === 'P' || e.key === '2') grade(true);
    else if (e.key === 'r' || e.key === 'R') retire();
  }
});


// ---- Init ----
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
loadData();
