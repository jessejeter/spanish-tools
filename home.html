<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-180.png">
<title>Spanish Practice</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #1a1a2e;
  color: #e4e4e4;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 32px;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

h1 {
  font-size: 22px;
  font-weight: 700;
  color: #e4e4e4;
  letter-spacing: 0.5px;
}

.btn {
  display: block;
  width: 100%;
  max-width: 320px;
  padding: 24px;
  border-radius: 16px;
  text-decoration: none;
  text-align: center;
  transition: transform 0.1s ease, opacity 0.1s ease;
}

.btn:active { transform: scale(0.97); opacity: 0.85; }

.btn-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}

.btn-sub {
  font-size: 14px;
  opacity: 0.75;
}

.btn-vocab {
  background: #0f3460;
  color: #e4e4e4;
}

.btn-frames {
  background: #1a1a40;
  color: #e4e4e4;
}
</style>
</head>
<body>

<h1>Spanish Practice</h1>

<a href="index.html" class="btn btn-vocab">
  <div class="btn-title">Vocabulary</div>
  <div class="btn-sub">Spanish ↔ English flashcards</div>
</a>

<a href="frames.html" class="btn btn-frames">
  <div class="btn-title">Frames</div>
  <div class="btn-sub">English → Spanish phrases</div>
</a>

</body>
</html>
