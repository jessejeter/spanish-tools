<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Spanish Frames</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --card: #0f3460;
  --card-back: #1a1a40;
  --text: #e4e4e4;
  --text-dim: #8888aa;
  --accent: #e94560;
  --green: #4ecca3;
  --yellow: #f0c040;
  --orange: #e07840;
  --red: #e94560;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

#loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 16px;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--surface);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#error {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 16px;
  padding: 24px;
  text-align: center;
}

#error button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

#app {
  display: none;
  flex-direction: column;
  flex: 1;
  max-width: 500px;
  width: 100%;
  margin: 0 auto;
  padding: 16px;
  gap: 16px;
}

.top-bar {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-size: 14px;
  color: var(--text-dim);
}

.top-bar .count { font-weight: 600; color: var(--text); }

.card-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1000px;
  cursor: pointer;
  min-height: 0;
}

.card {
  width: 100%;
  max-height: 100%;
  min-height: 250px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.4s ease;
}

.card.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
}

.card-front {
  background: var(--card);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.card-back {
  background: var(--card-back);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  transform: rotateY(180deg);
}

.card-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  margin-bottom: 16px;
}

.card-phrase {
  font-size: clamp(22px, 6vw, 36px);
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
}

.tap-hint {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 24px;
  opacity: 0.6;
}

/* Live timer on front */
#live-timer {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 12px;
  font-variant-numeric: tabular-nums;
  opacity: 0.7;
}

/* Timing result badge on back */
#timing-badge {
  font-size: 13px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 20px;
  margin-bottom: 20px;
  letter-spacing: 0.5px;
}

.grade-buttons {
  display: flex;
  gap: 12px;
  padding-bottom: env(safe-area-inset-bottom, 8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.grade-buttons.visible {
  opacity: 1;
  pointer-events: auto;
}

.grade-btn {
  flex: 1;
  padding: 16px 8px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  color: white;
  transition: transform 0.1s ease, opacity 0.1s ease;
}

.grade-btn:active { transform: scale(0.95); opacity: 0.8; }
.btn-fail { background: var(--red); }
.btn-pass-fast { background: #2a7a5a; }
.btn-pass-slow { background: #8a6a10; }

.undo-row {
  display: flex;
  justify-content: center;
  padding-bottom: env(safe-area-inset-bottom, 4px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.undo-row.visible {
  opacity: 1;
  pointer-events: auto;
}

.btn-undo {
  background: transparent;
  border: 1px solid #444466;
  color: #666688;
  padding: 8px 20px;
  border-radius: 8px;
  font-size: 13px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s, transform 0.1s;
}

.btn-undo:active { transform: scale(0.95); }

/* Flip-back button inside card */
.btn-flip-back {
  position: absolute;
  bottom: 10px;
  right: 12px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 6px;
  opacity: 0.4;
  line-height: 1;
}
.btn-flip-back:active { opacity: 0.8; }

#empty {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 16px;
  padding: 24px;
  text-align: center;
  color: var(--text-dim);
}

#empty h2 { font-size: 24px; color: var(--text); }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading frames...</p>
</div>

<div id="error">
  <p id="error-msg">Failed to load frames.</p>
  <button onclick="location.reload()">Retry</button>
</div>

<div id="app">
  <div class="top-bar">
    <span id="counter" class="count"></span>
  </div>

  <div class="card-container" id="card-container">
    <div class="card" id="card">
      <div class="card-face card-front">
        <div class="card-label">English</div>
        <div class="card-phrase" id="front-phrase"></div>
        <div class="tap-hint">tap to reveal</div>
        <div id="live-timer">0.0s</div>
        <div id="front-precall" style="font-size:11px;color:var(--text-dim);margin-top:8px;opacity:0.5;"></div>
      </div>
      <div class="card-face card-back">
        <div id="timing-badge"></div>
        <div class="card-label">Spanish</div>
        <div class="card-phrase" id="back-phrase"></div>
        <button class="btn-flip-back" onclick="event.stopPropagation(); flipToFront();">↩</button>
      </div>
    </div>
  </div>

  <div class="grade-buttons" id="grade-buttons">
    <button class="grade-btn btn-fail" onclick="grade(false)">Fail</button>
    <button class="grade-btn btn-pass-fast" id="btn-pass" onclick="grade(true)">Pass</button>
  </div>
  <div class="undo-row" id="undo-row">
    <button class="btn-undo" onclick="undoLast()">Undo last card</button>
  </div>
</div>

<div id="empty">
  <h2>All done!</h2>
  <p>You've been through every frame today. Come back tomorrow!</p>
</div>

<script>
const SPREADSHEET_ID = '14oqOzF2MXMDvhp8XbZo1fa3yFHTW3anVgfFrHvK4tNc';
const FRAMES_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=Frames&headers=1`;
const STORAGE_KEY = 'frames-srs-v1';
const TODAY_COUNT_KEY = 'frames-today-count';
const TODAY_SYNC_KEY = 'frame:__today__';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwbrp0yQwWy4TXLeG0h2NAhW3l0gS4ECGzHhkHJ2XxO2joA7-ShSkTR0Ax2tXbclNW7/exec';
const APPS_SCRIPT_FRAMES_URL = APPS_SCRIPT_URL + '?sheet=FramesSRS';

let allFrames = [];
let currentFrame = null;
let isFlipped = false;
let hasBeenRevealed = false;
let timerStart = null;
let timerInterval = null;
let elapsedSeconds = 0;
let sessionPass = 0, sessionFail = 0;
let lastUndo = null;

// ---- GViz parsing (same as vocab app) ----
function parseGvizJson(text) {
  const match = text.match(/google\.visualization\.Query\.setResponse\(({.*})\)/s);
  if (!match) throw new Error('Invalid response from Google Sheets');
  const data = JSON.parse(match[1]);
  if (data.status === 'error') {
    throw new Error(data.errors?.map(e => e.message).join(', ') || 'Sheet error');
  }
  return data.table.rows.map(row =>
    row.c.map(cell => (cell && cell.v != null) ? String(cell.v) : '')
  );
}

async function loadData() {
  try {
    const [res] = await Promise.all([
      fetch(FRAMES_URL),
      syncRemoteSRS(),
    ]);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rows = parseGvizJson(await res.text());

    const frames = [];
    for (const row of rows) {
      const en = (row[0] || '').trim();
      const es = (row[1] || '').trim();
      if (!en || !es) continue;
      frames.push({ en, es });
    }

    if (frames.length === 0) throw new Error('No frames found in the Frames sheet.');
    allFrames = frames;
    showApp();
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'flex';
    document.getElementById('error-msg').textContent = err.message;
  }
}

// ---- SRS ----
// All frame keys are prefixed with "frame:" so doPost can route them to FramesSRS.
function frameKey(en) { return 'frame:' + en; }

function getSRS() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}

function saveSRS(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function recordReview(en, passed) {
  const key = frameKey(en);
  const srs = getSRS();
  const entry = srs[key] || {};
  const reviews = entry.reviews || [];
  reviews.push({ date: todayStr(), passed });
  if (reviews.length > 20) reviews.shift();
  srs[key] = {
    ...entry,
    reviews,
    right: (entry.right || 0) + (passed ? 1 : 0),
    wrong: (entry.wrong || 0) + (passed ? 0 : 1),
    firstReview: entry.firstReview || todayStr(),
    lastReview: new Date().toISOString(),
  };
  saveSRS(srs);
  pushSRSRemote([{ word: key, ...srs[key] }]);
}

// ---- Remote Sync ----
async function syncRemoteSRS() {
  try {
    const res = await fetch(APPS_SCRIPT_FRAMES_URL);
    if (!res.ok) return;
    const remote = await res.json();
    const local = getSRS();
    const merged = { ...remote };
    const localOnly = [];
    for (const [word, data] of Object.entries(local)) {
      if (!merged[word] || (data.lastReview || '') > (merged[word].lastReview || '')) {
        merged[word] = data;
      }
      if (!remote[word]) localOnly.push({ word, ...data });
    }
    saveSRS(merged);

    const remoteCount = parseTodayCount(merged[TODAY_SYNC_KEY]);
    const localCount = getTodayCount();
    if (remoteCount > localCount) {
      setTodayCount(remoteCount);
    } else if (localCount > remoteCount) {
      pushTodayCount(localCount);
    }

    if (localOnly.length > 0) pushSRSRemote(localOnly);
  } catch (e) {
    console.warn('Frames SRS remote sync failed, using local data:', e);
  }
}

function pushSRSRemote(updates) {
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(updates),
  }).catch(e => console.warn('Frames SRS remote save failed:', e));
}

// ---- Half-Life Model (same as vocab app) ----
const HLR_GROWTH = 2.0, HLR_DECAY = 0.5, HLR_MIN_H = 0.5, HLR_INIT = 1.0;

function getPRecall(data) {
  if (!data) return 0;
  const reviews = data.reviews || [];
  const lastReview = data.lastReview || (reviews.length ? reviews[reviews.length - 1].date : null);
  if (!lastReview) return 0;
  let h = HLR_INIT, prevDate = null;
  for (const r of reviews) {
    const rawGap = prevDate ? (new Date(r.date) - new Date(prevDate)) / 86400000 : HLR_INIT;
    const gap = rawGap > 0 ? rawGap : HLR_INIT;
    h = Math.max(HLR_MIN_H, gap * (r.passed ? HLR_GROWTH : HLR_DECAY));
    prevDate = r.date;
  }
  const daysSinceLast = (Date.now() - new Date(lastReview)) / 86400000;
  return Math.pow(2, -daysSinceLast / h);
}

function weightedRandom(frames, srs) {
  const weights = frames.map(f => Math.pow(1 - getPRecall(srs[frameKey(f.en)]), 2));
  const total = weights.reduce((s, w) => s + w, 0);
  if (total === 0) return frames[Math.floor(Math.random() * frames.length)];
  let r = Math.random() * total;
  for (let i = 0; i < frames.length; i++) {
    r -= weights[i];
    if (r <= 0) return frames[i];
  }
  return frames[frames.length - 1];
}

function pickNextFrame() {
  const srs = getSRS();

  // New frames first (never reviewed), in sheet order
  const unreviewed = allFrames.filter(f => !srs[frameKey(f.en)]?.reviews?.length);
  if (unreviewed.length) return unreviewed[0];

  // Then weighted random from all reviewed, non-retired frames
  // Exclude the just-graded frame to avoid immediate repeats
  const pool = allFrames.filter(f => {
    if (srs[frameKey(f.en)]?.retired) return false;
    if (f.en === currentFrame?.en) return false;
    return (srs[frameKey(f.en)]?.reviews?.length || 0) > 0;
  });

  if (!pool.length) {
    // Edge case: only one frame exists and it's not retired
    const any = allFrames.find(f => !srs[frameKey(f.en)]?.retired);
    return any || null;
  }

  return weightedRandom(pool, srs);
}

// ---- Timer ----
function startTimer() {
  timerStart = performance.now();
  const liveEl = document.getElementById('live-timer');
  liveEl.textContent = '0.0s';
  timerInterval = setInterval(() => {
    const s = (performance.now() - timerStart) / 1000;
    liveEl.textContent = s.toFixed(1) + 's';
  }, 50);
}

function stopTimer() {
  clearInterval(timerInterval);
  elapsedSeconds = (performance.now() - timerStart) / 1000;
  return elapsedSeconds;
}

function getTimingResult(s) {
  if (s <= 5) return { label: `${s.toFixed(1)}s — Pass`, color: '#4ecca3', pass: true };
  if (s <= 7) return { label: `${s.toFixed(1)}s — Fail (hesitant)`, color: '#e94560', pass: false };
  return       { label: `${s.toFixed(1)}s — Fail (breakdown)`,      color: '#e94560', pass: false };
}

// ---- Date Helpers ----
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ---- Today Counter ----
function getTodayCount() {
  try {
    const data = JSON.parse(localStorage.getItem(TODAY_COUNT_KEY));
    if (data && data.date === todayStr()) return data.count;
  } catch {}
  return 0;
}

function incrementTodayCount() {
  const count = getTodayCount() + 1;
  localStorage.setItem(TODAY_COUNT_KEY, JSON.stringify({ date: todayStr(), count }));
  pushTodayCount(count);
}

function parseTodayCount(entry) {
  if (!entry?.reviews?.length) return 0;
  const r = entry.reviews[0];
  return r.date === todayStr() ? (r.count || 0) : 0;
}

function setTodayCount(count) {
  localStorage.setItem(TODAY_COUNT_KEY, JSON.stringify({ date: todayStr(), count }));
}

function pushTodayCount(count) {
  pushSRSRemote([{
    word: TODAY_SYNC_KEY,
    reviews: [{ date: todayStr(), count }],
    lastReview: todayStr(),
    retired: false,
  }]);
}

// ---- UI ----
function updateCounter() {
  const srs = getSRS();
  const newCount = allFrames.filter(f => !srs[frameKey(f.en)]?.reviews?.length).length;
  const count = getTodayCount();

  const parts = [];
  if (count > 0) {
    parts.push(`${count} done today`);
    parts.push(`<span style="color:var(--green)">${sessionPass} pass</span>`);
    parts.push(`<span style="color:var(--red)">${sessionFail} fail</span>`);
  }
  if (newCount > 0) parts.push(`${newCount} new`);

  document.getElementById('counter').innerHTML = parts.join(' · ') || '&nbsp;';
}

function showApp() {
  document.getElementById('loading').style.display = 'none';
  const frame = pickNextFrame();
  if (!frame) {
    showEmpty();
    return;
  }
  document.getElementById('app').style.display = 'flex';
  showFrame(frame);
}

function showFrame(frame) {
  currentFrame = frame;
  isFlipped = false;
  hasBeenRevealed = false;

  document.getElementById('card').classList.remove('flipped');
  document.getElementById('grade-buttons').classList.remove('visible');
  document.getElementById('timing-badge').textContent = '';
  document.getElementById('live-timer').textContent = '0.0s';

  document.getElementById('front-phrase').textContent = frame.en;
  document.getElementById('back-phrase').textContent = frame.es;

  const srsData = getSRS()[frameKey(frame.en)];
  const p = getPRecall(srsData);
  const precallEl = document.getElementById('front-precall');
  precallEl.textContent = srsData?.lastReview ? `P(recall): ${Math.round(p * 100)}%` : 'new';

  updateCounter();
  startTimer();
}

function flipCard() {
  if (isFlipped) return;
  isFlipped = true;

  if (!hasBeenRevealed) {
    hasBeenRevealed = true;
    const elapsed = stopTimer();
    const result = getTimingResult(elapsed);

    const badge = document.getElementById('timing-badge');
    badge.textContent = result.label;
    badge.style.background = result.color + '22';
    badge.style.color = result.color;
    badge.style.border = `1px solid ${result.color}66`;

    const passBtn = document.getElementById('btn-pass');
    if (result.pass) {
      passBtn.textContent = 'Pass';
      passBtn.className = 'grade-btn btn-pass-fast';
      passBtn.onclick = () => grade(true);
    } else {
      passBtn.textContent = 'Got it';
      passBtn.className = 'grade-btn btn-pass-slow';
      passBtn.onclick = () => grade(false);
    }
  }

  document.getElementById('card').classList.add('flipped');
  document.getElementById('grade-buttons').classList.add('visible');
}

function flipToFront() {
  if (!isFlipped) return;
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('grade-buttons').classList.remove('visible');
}

function grade(passed) {
  if (!currentFrame) return;
  const srs = getSRS();
  const key = frameKey(currentFrame.en);
  lastUndo = {
    frame: currentFrame,
    srsEntry: srs[key] ? JSON.parse(JSON.stringify(srs[key])) : null,
    todayCount: getTodayCount(),
    pass: sessionPass,
    fail: sessionFail,
  };
  recordReview(currentFrame.en, passed);
  incrementTodayCount();
  if (passed) sessionPass++; else sessionFail++;
  updateCounter();
  const next = pickNextFrame();
  if (!next) { showEmpty(); return; }
  showFrame(next);
  document.getElementById('undo-row').classList.add('visible');
}

function undoLast() {
  if (!lastUndo) return;
  const { frame, srsEntry, todayCount, pass, fail } = lastUndo;
  lastUndo = null;
  const srs = getSRS();
  const key = frameKey(frame.en);
  if (srsEntry === null) {
    delete srs[key];
  } else {
    srs[key] = srsEntry;
  }
  saveSRS(srs);
  pushSRSRemote([{ word: key, ...(srsEntry || { reviews: [], retired: false }) }]);
  localStorage.setItem(TODAY_COUNT_KEY, JSON.stringify({ date: todayStr(), count: todayCount }));
  pushTodayCount(todayCount);
  sessionPass = pass;
  sessionFail = fail;
  document.getElementById('undo-row').classList.remove('visible');
  showFrame(frame);
}

function showEmpty() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('empty').style.display = 'flex';
  document.getElementById('empty').querySelector('h2').textContent = 'All frames retired';
  document.getElementById('empty').querySelector('p').textContent = "You've retired every frame. Nothing left!";
}

// ---- Events ----
document.getElementById('card-container').addEventListener('click', () => {
  if (!isFlipped) flipCard();
});

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (!isFlipped) flipCard();
  } else if (isFlipped) {
    if (e.key === 'p' || e.key === 'P' || e.key === '2') document.getElementById('btn-pass').click();
    else if (e.key === 'f' || e.key === 'F' || e.key === '1') grade(false);
  }
});

loadData();
</script>
</body>
</html>
